<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Amo Juliii ❤️</title>
<style>
body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:url('fondo.jpeg') center center/cover no-repeat;
background-attachment:fixed;
font-family:Arial,sans-serif;
text-align:center;
color:white;
}
.croc{position:absolute;font-size:40px;animation:flotar 8s linear infinite;opacity:.8;}
@keyframes flotar{from{transform:translateY(110vh);}to{transform:translateY(-120px);}}
.carta{background:rgba(0,0,0,.65);padding:40px;border-radius:20px;max-width:650px;}
h1{color:#ff7aa2;}
</style>
</head>
<body>
<div class="croc" style="left:10%">❤️</div>
<div class="croc" style="left:25%;animation-delay:2s">❤️</div>
<div class="croc" style="left:50%;animation-delay:4s">❤️</div>
<div class="croc" style="left:75%;animation-delay:1s">❤️</div>
<div class="croc" style="left:90%;animation-delay:5s">❤️</div>

<audio id="audio" loop autoplay src="yoko.mp3"></audio>

<div class="carta">
<h1>Te Amo Juliii</h1>
<p>
En poco tiempo te volviste alguien muy especial para mí y ya seguro te diste cuenta que soy un tonto y 1000 veces me equivoco,
pero te quiero siempre a mi ladito como Yoko y ojalá no te vayas nunca ;)
</p>
</div>

</body>
</html>
